# Welcome to Jekyll!
# 基础站点设置
locale                   : "zh-CN"
site_theme               : "default"
title                    : "苟光磊 (Guanglei Gou) - 个人主页"
title_separator          : "-"
name                     : &name "Guanglei Gou"
description              : &description "Guanglei Gou's academic portfolio"
url                      : "https://fomenGgl.github.io"
baseurl                  : "" 
repository               : "fomenGgl/fomenGgl.github.io"

# 站点作者设置 - 控制左侧边栏显示的内容
author:
  avatar           : "me.png"
  name             : "苟光磊 (Guanglei Gou)"
  pronouns         : 
  bio              : "重庆理工大学计算机科学与工程学院讲师，研究方向主要聚焦计算机视觉。"
  location         : "重庆, 中国"
  employer         : "计算机科学与工程学院"
  uri              : 
  email            : "ggl@cqut.edu.cn" 
  academia         : 
  arxiv            : 
  googlescholar    : 
  inspire-hep      : 
  impactstory      : 
  orcid            : 
  semantic         : 
  ssrn             : 
  pubmed           : 
  researchgate     : 
  scopus           : 
  zotero           : 
  bitbucket        : 
  codepen          : 
  dribbble         : 
  github           : 
  kaggle           : 
  stackoverflow    : 
  weibo            : 
  zhihu            : 

# 出版物分类
publication_category:
  books:
    title: '专著'
  manuscripts:
    title: '期刊论文'    
  conferences:
    title: '会议论文'

# 站点功能设置
teaser                   : 
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false
comments:
  provider               : false

# 插件与转换设置
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# 需要 Jekyll 处理的额外目录（关键修复）
include:
  - .htaccess
  - _pages

# 集合定义
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# 默认页面配置
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# 其他输出设置
timezone: Asia/Shanghai
encoding: "utf-8"

# 插件列表
plugins:
  - jekyll-feed
  - jemoji
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
